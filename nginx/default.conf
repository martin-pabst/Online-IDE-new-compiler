# Dev host: rely on upstream proxy headers to avoid duplicated CORS values.
server {
    listen 80;
    server_name onlineide.dev.blockly2java.de;

    root /usr/share/nginx/html;
    index index.html;
}

# Default/prod host: emit permissive CORS headers for embedded usage.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Range" always;

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
