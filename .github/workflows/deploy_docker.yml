name: Build and Deploy Docker image

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.draft == true) }}
    runs-on: ubuntu-latest
    environment:
      # Use 'production' for release builds, 'onlineide-dev' for staging/dev builds
      name: ${{ github.event_name == 'release' && 'production' || 'onlineide-dev' }}
      url: https://${{ vars.DEPLOY_HOST }}

    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Write version to VERSION file
        run: |
          last_released=$(cat VERSION 2>/dev/null | tr -d '\r\n[:space:]' || echo "v0.0.0-unknown")
          if [ -z "$last_released" ] || [ "$last_released" = "local" ]; then
            last_released="v0.0.0-unknown"
          fi
          short_sha=$(echo ${{ github.sha }} | cut -c1-7)
          if [ "${{ github.event_name }}" = "release" ]; then
            release_version="${{ github.event.release.tag_name }}"
          else
            release_version="${last_released}-${short_sha}"
          fi
          echo "$release_version" > VERSION
          
          # Also update package.json
          clean_version=$(echo "$release_version" | sed 's/^v//')
          npm version "$clean_version" --no-git-tag-version --allow-same-version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend
        run: |
          bash scripts/install_and_build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image_tags
        run: |
          set -e
          REGISTRY="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY:-ghcr.io}"
          IMAGE_NAME="${{ vars.DOCKER_IMAGE }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [ -z "$IMAGE_NAME" ]; then
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_NAME="${REPO_LOWER#*/}"
          fi
          BASE_IMAGE="$REGISTRY/$OWNER/$IMAGE_NAME"
          SHA_TAG="$BASE_IMAGE:${{ github.sha }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            DEPLOY_TAG="$BASE_IMAGE:$RELEASE_TAG"
            LATEST_TAG="$BASE_IMAGE:latest"
            echo "deploy_tag=$DEPLOY_TAG" >> $GITHUB_OUTPUT
            echo "extra_tags=$DEPLOY_TAG $LATEST_TAG" >> $GITHUB_OUTPUT
          else
            DEPLOY_TAG="$BASE_IMAGE:dev"
            echo "deploy_tag=$DEPLOY_TAG" >> $GITHUB_OUTPUT
            echo "extra_tags=$DEPLOY_TAG" >> $GITHUB_OUTPUT
          fi
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          set -e
          SHA_TAG="${{ steps.image_tags.outputs.sha_tag }}"
          BUILD_ARGS="-t $SHA_TAG"
          for TAG in ${{ steps.image_tags.outputs.extra_tags }}; do
            BUILD_ARGS="$BUILD_ARGS -t $TAG"
          done
          
          # Run docker build (adapt build args if the OnlineIDE Dockerfile needs different ones)
          DOCKER_BUILDKIT=1 docker build --pull --no-cache $BUILD_ARGS .
          
          docker push "$SHA_TAG"
          for TAG in ${{ steps.image_tags.outputs.extra_tags }}; do
            docker push "$TAG"
          done

      - name: Deploy on server via SSH (pull image and restart container)
        # By default, SSH deployment is disabled (if: false) matching Blockly2Java.
        # Set to: if: github.event_name == 'release' (or similar condition) to enable.
        if: false
        env:
          SSH_HOST: ${{ vars.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          IMAGE_NAME: ${{ steps.image_tags.outputs.deploy_tag }}
          REMOTE_PORT: ${{ vars.DEPLOY_APP_PORT }}
          CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME }}
        run: |
          bash scripts/deploy_via_ssh.sh "$IMAGE_NAME" "${REMOTE_PORT:-80}" "${CONTAINER_NAME:-online-ide}"
