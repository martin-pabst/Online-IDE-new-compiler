name: Manage Release Branch

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Version/Release name (e.g. v3.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  push-to-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Push to release branch
        run: |
          git fetch origin
          
          if [ "${{ github.event_name }}" = "release" ]; then
            release_version="${{ github.event.release.tag_name }}"
          else
            release_version="${{ github.event.inputs.release_name }}"
          fi
          
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Write version to VERSION file
          echo "$release_version" > VERSION
          
          # Update package.json version
          # Remove 'v' prefix if present since npm version expects semver
          clean_version=$(echo "$release_version" | sed 's/^v//')
          npm version "$clean_version" --no-git-tag-version --allow-same-version
          
          # Commit the updated VERSION and package.json files to main branch
          git add VERSION package.json
          git commit -m "chore: update VERSION to $release_version [skip ci]" --allow-empty
          git push origin HEAD:refs/heads/main
          
          # Create a version of the commit without [skip ci] for the release branch so Cloudflare Pages deploys it
          git commit --amend -m "chore: update VERSION to $release_version"
          git push origin HEAD:refs/heads/release --force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          bash scripts/install_and_build.sh

      - name: Create CNAME file
        if: vars.CUSTOM_DOMAIN != ''
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: push-to-release
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
